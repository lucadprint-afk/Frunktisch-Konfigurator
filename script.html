<script>

// =========================
// DATA
// =========================

const PRODUCTS = {
  model: [
    { id:"model_y", name:"Model Y", price:249 },
    { id:"model_3", name:"Model 3", price:229 }
  ],
  color: [
    { id:"beige", name:"Beige", price:0 },
    { id:"white", name:"Weiß", price:0 },
    { id:"natural", name:"Natur", price:0 }
  ],
  option: [
    { id:"telescopic", name:"Teleskopfach", price:30 },
    { id:"cutlery", name:"Besteckfach", price:15 },
    { id:"stowage", name:"Stowage", price:25 }
  ]
};


// =========================
// STATE
// =========================

const state = {
  model:null,
  color:null,
  options:[]
};


// =========================
// INIT
// =========================

window.onload = () => {

  loadFromURL();

  renderAll();
  updateUI();

};


// =========================
// RENDER
// =========================

function renderAll(){
  renderCards("modelContainer", PRODUCTS.model, "model");
  renderCards("colorContainer", PRODUCTS.color, "color");
  renderCards("optionContainer", PRODUCTS.option, "option");
}


// =========================
// CARDS
// =========================

function renderCards(containerId, items, type){

  const container = document.getElementById(containerId);

  items.forEach((item, i) => {

    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <div class="title">${item.name}</div>
      <div class="price">${item.price ? item.price + " €":""}</div>
    `;

    el.onclick = () => handleSelect(type, item, containerId);

    container.appendChild(el);

    setTimeout(() => el.classList.add("visible"), i * 60);

  });

}


// =========================
// SELECTION LOGIC (v0.6 + v0.7 MERGED)
// =========================

function handleSelect(type, item, containerId){

  if(type === "model"){
    state.model = item;
    scrollTo("colorContainer");
  }

  if(type === "color"){

    if(!state.model){
      triggerShake(containerId);
      return;
    }

    state.color = item;
    scrollTo("optionContainer");
  }

  if(type === "option"){

    if(!state.model){
      triggerShake(containerId);
      return;
    }

    if(!state.color){
      triggerShake(containerId);
      return;
    }

    const exists = state.options.find(o => o.id === item.id);

    state.options = exists
      ? state.options.filter(o => o.id !== item.id)
      : [...state.options, item];
  }

  updateUI();

}


// =========================
// UI MASTER
// =========================

function updateUI(){
  updateSelection();
  updatePrice();
  updatePreview();
  updateSteps();
  update3D();
}


// =========================
// STEP SYSTEM
// =========================

function updateSteps(){

  const steps = document.querySelectorAll("h3");

  steps.forEach(s => s.classList.remove("active-step","inactive-step"));

  steps[0].classList.add("active-step");

  if(!state.model){
    steps[1].classList.add("inactive-step");
    steps[2].classList.add("inactive-step");
    return;
  }

  steps[1].classList.add("active-step");

  if(!state.color){
    steps[2].classList.add("inactive-step");
    return;
  }

  steps[2].classList.add("active-step");
}


// =========================
// SELECTION UI
// =========================

function updateSelection(){

  document.querySelectorAll("#modelContainer .card")
    .forEach(el =>
      el.classList.toggle("selected", state.model && el.innerText.includes(state.model.name))
    );

  document.querySelectorAll("#colorContainer .card")
    .forEach(el =>
      el.classList.toggle("selected", state.color && el.innerText.includes(state.color.name))
    );

  document.querySelectorAll("#optionContainer .card")
    .forEach(el =>
      el.classList.toggle("selected", state.options.some(o => el.innerText.includes(o.name)))
    );

}


// =========================
// PRICE
// =========================

function getPrice(){

  let p = 0;

  if(state.model) p += state.model.price;
  if(state.color) p += state.color.price;

  state.options.forEach(o => p += o.price);

  return p;
}

function updatePrice(){
  document.getElementById("price").innerText = "Preis: " + getPrice() + " €";
}


// =========================
// PREVIEW
// =========================

function updatePreview(){

  document.getElementById("preview").innerHTML = `
    <div>
      <h2>${state.model?.name || "Bitte Modell wählen"}</h2>
      <p>${state.color?.name || ""}</p>
      <p>${state.options.map(o => o.name).join(", ")}</p>
    </div>
  `;
}


// =========================
// SCROLL (v0.7)
// =========================

function scrollTo(id){
  const el = document.getElementById(id);
  if(el){
    el.scrollIntoView({behavior:"smooth", block:"start"});
  }
}


// =========================
// SHAKE
// =========================

function triggerShake(id){

  const el = document.getElementById(id);

  el.classList.remove("shake");
  void el.offsetWidth;
  el.classList.add("shake");

}


// =========================
// URL SHARE + LOAD
// =========================

function generateURL(){

  const p = new URLSearchParams();

  if(state.model) p.set("model", state.model.id);
  if(state.color) p.set("color", state.color.id);
  if(state.options.length) p.set("options", state.options.map(o=>o.id).join(","));

  return location.origin + location.pathname + "?" + p.toString();
}


function loadFromURL(){

  const p = new URLSearchParams(location.search);

  const m = PRODUCTS.model.find(x => x.id === p.get("model"));
  const c = PRODUCTS.color.find(x => x.id === p.get("color"));

  if(m) state.model = m;
  if(c) state.color = c;

  const opt = p.get("options");

  if(opt){
    state.options = opt.split(",")
      .map(id => PRODUCTS.option.find(x => x.id === id))
      .filter(Boolean);
  }

}

function copyShareLink(){
  const url = generateURL();
  navigator.clipboard.writeText(url);
  alert("Link kopiert");
}


// =========================
// ORDER
// =========================

function createOrder(){

  if(!state.model) return triggerShake("modelContainer");
  if(!state.color) return triggerShake("colorContainer");

  const order = {
    id:"ORD-"+Date.now(),
    model:state.model.name,
    color:state.color.name,
    options:state.options.map(o=>o.name),
    price:getPrice(),
    createdAt:new Date().toISOString()
  };

  google.script.run
    .withSuccessHandler(()=>alert("Auftrag gespeichert"))
    .saveOrder(order);

}

// =========================
// 3D Rendering
// =========================

function update3D(){

  const viewer = document.getElementById("viewer");

  if(!state.model){
    return;
  }

  if(state.model.id === "model_y"){
    viewer.src = "https://lucadprint-afk.github.io/Frunktisch-Konfigurator/models/MY-Eingeklappt.glb";
  }

  if(state.model.id === "model_3"){
    viewer.src = "https://lucadprint-afk.github.io/Frunktisch-Konfigurator/models/MY-Eingeklappt.glb";
  }

}



</script>
